site_name: Auto Modeling Tool
site_description: High-performance auto-modeling framework built with Polars for credit risk modeling
site_url: https://levywiseco.github.io/auto-modeling-tool/
repo_url: https://github.com/Levywiseco/auto-modeling-tool
repo_name: Levywiseco/auto-modeling-tool

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - 首页: index.md
  - 开始使用:
      - 安装: getting-started/installation.md
      - 10 分钟 Quickstart: getting-started/quickstart.md
      - 核心 API 约定: getting-started/api-conventions.md
  - 使用指南:
      - 数据画像: guide/data-profiling.md
      - 分箱与风险评估: guide/binning-risk-evaluation.md
      - 特征筛选: guide/feature-selection.md
      - 特征与模型监控: guide/monitoring.md
      - 报告与导出: guide/reports.md
  - API Reference:
      - Analysis: reference/analysis.md
      - Monitoring: reference/monitoring.md
      - Report 对象: reference/report-objects.md
  - 项目:
      - 稳定性与兼容性: project/stability.md
      - Release Notes: project/release-notes.md
